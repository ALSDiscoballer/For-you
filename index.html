/* ============================= */

let currentSong = 0;
const player = document.getElementById("player");
const playlistDiv = document.getElementById("playlist");

/* Create Now Playing text */
const nowPlaying = document.createElement("h3");
nowPlaying.innerText = "Tap a song to start 🎵";
document.body.insertBefore(nowPlaying, document.querySelector(".controls"));

/* Create playlist */
songs.forEach((song, index) => {
  const div = document.createElement("div");
  div.classList.add("song");
  div.textContent = song.name;
  div.onclick = () => loadSong(index);
  div.id = "song-" + index;
  playlistDiv.appendChild(div);
});

function loadSong(index) {
  currentSong = index;
  player.src = songs[currentSong].file;
  player.play();
  nowPlaying.innerText = "Now Playing: " + songs[currentSong].name;
  highlightSong();
}

function playPause() {
  if (player.paused) {
    player.play();
  } else {
    player.pause();
  }
}

function nextSong() {
  currentSong = (currentSong + 1) % songs.length;
  loadSong(currentSong);
}

function prevSong() {
  currentSong = (currentSong - 1 + songs.length) % songs.length;
  loadSong(currentSong);
}

function shuffleSong() {
  currentSong = Math.floor(Math.random() * songs.length);
  loadSong(currentSong);
}

function highlightSong() {
  document.querySelectorAll(".song").forEach(el => el.classList.remove("active"));
  document.getElementById("song-" + currentSong).classList.add("active");
}

player.addEventListener("ended", nextSong);

/* Floating birthday emojis */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "🥳";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 600);
